<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Latent Space Not Found</title>
    <link rel="icon" type="image/avif" href="assets/favicon.avif" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #090a0f;
        --bg-alt: #12141f;
        --text: #f8efe6;
        --muted: #8b949e;
        --accent: #8b5cf6;
        --accent-2: #3b82f6;
        --accent-3: #10b981;
        --font-heading: "Space Grotesk", sans-serif;
        --font-body: "Outfit", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--font-body);
        color: var(--text);
        background-color: var(--bg);
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.1), transparent 40%);
        overflow: hidden;
      }

      /* Cyber Mesh Background */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 30px 30px;
        z-index: -1;
        opacity: 0.5;
        transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
        animation: gridMove 20s linear infinite;
      }

      @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 0 30px; }
      }

      .terminal-box {
        background: rgba(18, 20, 31, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 12px;
        padding: 3rem;
        max-width: 600px;
        width: 90%;
        box-shadow: 0 0 40px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(0,0,0,0.5);
        text-align: left;
        position: relative;
      }

      .terminal-header {
        position: absolute;
        top: 0; left: 0; width: 100%;
        height: 30px;
        background: rgba(139, 92, 246, 0.1);
        border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 12px 12px 0 0;
        display: flex;
        align-items: center;
        padding: 0 1rem;
        gap: 8px;
      }

      .dot {
        width: 10px; height: 10px; border-radius: 50%;
      }
      .dot:nth-child(1) { background: #ef4444; }
      .dot:nth-child(2) { background: #f59e0b; }
      .dot:nth-child(3) { background: #10b981; }

      .eyebrow {
        margin: 2rem 0 0.5rem;
        color: var(--accent-3);
        font-family: var(--font-heading);
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 1rem;
        font-family: var(--font-heading);
        font-size: clamp(3rem, 10vw, 5rem);
        line-height: 1;
        color: white;
        text-shadow: 0 0 20px rgba(139, 92, 246, 0.8);
      }

      .glitch {
        position: relative;
      }
      .glitch::before, .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        opacity: 0.8;
      }
      .glitch::before {
        left: 2px;
        text-shadow: -2px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }
      .glitch::after {
        left: -2px;
        text-shadow: -2px 0 #00fff9;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim {
        0% { clip: rect(61px, 9999px, 52px, 0); }
        20% { clip: rect(33px, 9999px, 14px, 0); }
        40% { clip: rect(94px, 9999px, 89px, 0); }
        60% { clip: rect(2px, 9999px, 98px, 0); }
        80% { clip: rect(51px, 9999px, 23px, 0); }
        100% { clip: rect(82px, 9999px, 4px, 0); }
      }
      @keyframes glitch-anim2 {
        0% { clip: rect(29px, 9999px, 98px, 0); }
        20% { clip: rect(18px, 9999px, 76px, 0); }
        40% { clip: rect(81px, 9999px, 34px, 0); }
        60% { clip: rect(12px, 9999px, 89px, 0); }
        80% { clip: rect(66px, 9999px, 43px, 0); }
        100% { clip: rect(54px, 9999px, 11px, 0); }
      }

      p {
        margin: 0 0 2rem;
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1.6;
        font-family: monospace;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1.6rem;
        border-radius: 8px;
        font-family: var(--font-heading);
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        color: white;
        background: rgba(139, 92, 246, 0.2);
        border: 1px solid var(--accent);
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        transition: all 0.3s ease;
      }

      .btn:hover { 
        background: var(--accent);
        box-shadow: 0 0 25px var(--accent);
        transform: translateY(-2px); 
      }

      .typing::after {
        content: '|';
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }

    </style>
  </head>
  <body>
    <div class="terminal-box">
      <div class="terminal-header">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <p class="eyebrow">Exception Caught</p>
      <h1 class="glitch" data-text="404">404</h1>
      <p>> System log: Target URL hallucinated.<br>> Agent status: Lost in latent space.<br><span style="color:var(--accent-3)">> Resolving redirect...</span> <span class="typing"></span></p>
      <a href="index.html" class="btn">Return to Base Node</a>
    </div>
  </body>
</html>
